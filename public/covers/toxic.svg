<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0066"/>
      <stop offset="45%" stop-color="#cc0055"/>
      <stop offset="100%" stop-color="#660022"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#ff88bb" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff88bb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#ffaacc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffaacc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="300" height="300" fill="url(#bg)"/>
  <rect width="300" height="300" fill="url(#glow1)"/>
  <rect width="300" height="300" fill="url(#glow2)"/>

  <!-- Glamour diagonal sweep -->
  <rect x="-40" y="80" width="420" height="28" fill="rgba(255,255,255,0.07)" transform="rotate(-18 150 150)"/>
  <rect x="-40" y="130" width="420" height="10" fill="rgba(255,255,255,0.04)" transform="rotate(-18 150 150)"/>

  <!-- Star sparkles -->
  <g filter="url(#sparkle)" fill="#fff">
    <polygon points="55,55 58,48 61,55 68,55 62,60 65,67 58,62 51,67 54,60 48,55" opacity="0.9"/>
    <polygon points="235,42 237,37 239,42 244,42 240,46 242,51 237,47 232,51 234,46 230,42" opacity="0.8"/>
    <polygon points="270,160 272,154 274,160 280,160 275,164 277,170 272,166 267,170 269,164 264,160" opacity="0.7"/>
    <polygon points="30,200 32,195 34,200 40,200 35,204 37,210 32,206 27,210 29,204 24,200" opacity="0.6"/>
    <polygon points="190,20 191,16 192,20 196,20 193,23 194,27 191,24 188,27 189,23 186,20" opacity="0.85"/>
    <polygon points="80,260 81,256 82,260 86,260 83,263 84,267 81,264 78,267 79,263 76,260" opacity="0.6"/>
    <!-- Small dot sparkles -->
    <circle cx="120" cy="30" r="2" opacity="0.9"/>
    <circle cx="250" cy="100" r="1.5" opacity="0.8"/>
    <circle cx="40" cy="140" r="2" opacity="0.7"/>
    <circle cx="200" cy="250" r="1.5" opacity="0.75"/>
    <circle cx="140" cy="275" r="2.5" opacity="0.6"/>
  </g>

  <!-- Bottom gradient overlay for text -->
  <linearGradient id="textbg" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
  </linearGradient>
  <rect x="0" y="200" width="300" height="100" fill="url(#textbg)"/>

  <!-- Artist + title -->
  <text x="150" y="245" font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="4"
        font-weight="700">BRITNEY SPEARS</text>
  <text x="150" y="266" font-family="Arial Black, Arial, sans-serif" font-size="22"
        fill="#fff" text-anchor="middle" letter-spacing="2" font-weight="900">TOXIC</text>
</svg>
