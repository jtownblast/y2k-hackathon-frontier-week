<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="c1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2255" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff2255" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00eeff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00eeff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffe000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#44ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc44ff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#cc44ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Black background -->
  <rect width="300" height="300" fill="url(#bg)"/>

  <!-- Overlapping glow circles — inspired by Hot Fuss cover palette -->
  <ellipse cx="110" cy="100" rx="110" ry="110" fill="url(#c1)"/>
  <ellipse cx="200" cy="130" rx="100" ry="100" fill="url(#c2)"/>
  <ellipse cx="150" cy="210" rx="120" ry="100" fill="url(#c3)"/>
  <ellipse cx="60"  cy="200" rx="90"  ry="90"  fill="url(#c4)"/>
  <ellipse cx="230" cy="220" rx="80"  ry="80"  fill="url(#c5)"/>
  <ellipse cx="180" cy="60"  rx="70"  ry="70"  fill="url(#c1)"/>

  <!-- Scan-line texture overlay -->
  <rect width="300" height="300" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"
        style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px)"/>

  <!-- Band name -->
  <text x="150" y="242" font-family="Arial Black, Arial, sans-serif" font-size="22"
        font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="3"
        filter="url(#glow)">THE KILLERS</text>
  <!-- Album subtitle -->
  <text x="150" y="264" font-family="Arial, sans-serif" font-size="11"
        fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">HOT FUSS</text>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
