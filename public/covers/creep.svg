<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#c8581a"/>
      <stop offset="40%" stop-color="#8b2200"/>
      <stop offset="100%" stop-color="#1a0800"/>
    </linearGradient>
    <radialGradient id="orb" cx="38%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#ff8833" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#cc4400" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#cc4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="68%" cy="62%" r="35%">
      <stop offset="0%" stop-color="#ffcc44" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffcc44" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="300" height="300" fill="url(#bg)"/>
  <rect width="300" height="300" fill="url(#orb)"/>
  <rect width="300" height="300" fill="url(#orb2)"/>

  <!-- Pablo Honey inspired: rough horizontal stripes / distortion -->
  <g opacity="0.12">
    <rect x="0" y="40"  width="300" height="3" fill="#ff8800"/>
    <rect x="0" y="72"  width="240" height="2" fill="#ff8800"/>
    <rect x="0" y="95"  width="180" height="4" fill="#ff6600"/>
    <rect x="0" y="120" width="300" height="2" fill="#ff8800"/>
    <rect x="0" y="148" width="220" height="3" fill="#ff8800"/>
    <rect x="0" y="175" width="280" height="2" fill="#ff6600"/>
    <rect x="0" y="195" width="150" height="4" fill="#ff8800"/>
  </g>

  <!-- Distorted face/mask silhouette suggestion (abstract) -->
  <g opacity="0.18" fill="#ff6622">
    <ellipse cx="148" cy="118" rx="52" ry="62"/>
    <ellipse cx="148" cy="98"  rx="30" ry="28" fill="#1a0800" opacity="1"/>
    <ellipse cx="130" cy="110" rx="9"  ry="11" fill="#ff9944" opacity="0.6"/>
    <ellipse cx="166" cy="110" rx="9"  ry="11" fill="#ff9944" opacity="0.6"/>
    <path d="M128 142 Q148 155 168 142" stroke="#ff9944" stroke-width="3" fill="none" opacity="0.8"/>
  </g>

  <!-- Grain overlay -->
  <rect width="300" height="300" fill="rgba(0,0,0,0.15)" filter="url(#noise)" opacity="0.4"/>

  <!-- Dark bottom band -->
  <linearGradient id="bot" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
  </linearGradient>
  <rect x="0" y="190" width="300" height="110" fill="url(#bot)"/>

  <!-- Text -->
  <text x="150" y="242" font-family="Arial, Helvetica, sans-serif" font-size="12"
        fill="rgba(255,200,150,0.8)" text-anchor="middle" letter-spacing="5"
        font-weight="400">RADIOHEAD</text>
  <text x="150" y="268" font-family="Arial Black, Arial, sans-serif" font-size="26"
        fill="#fff" text-anchor="middle" letter-spacing="1" font-weight="900"
        filter="url(#glow3)">CREEP</text>
</svg>
